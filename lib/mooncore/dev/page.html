<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mooncore Dev</title>
  <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/material-darker.min.css" media="print" onload="this.media='all'">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #374151;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #4b5563;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #a78bfa;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    pre,
    code {
      font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
      margin: 0;
    }

    code {
      font-size: 0.8em;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #7c3aed !important;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th {
      text-align: left;
    }

    textarea {
      resize: vertical;
    }

    .editor-textarea {
      resize: none;
      tab-size: 2;
      line-height: 1.6;
    }

    .editor-textarea:focus {
      outline: none;
      box-shadow: none !important;
      border-color: #374151 !important;
    }

    .cm-wrap {
      height: 100%;
    }

    .cm-wrap .CodeMirror {
      height: 100%;
      background: #030712;
      font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
      font-size: 12px;
      line-height: 1.6;
    }

    .cm-wrap .CodeMirror-gutters {
      background: #030712;
      border-right: 1px solid #1f2937;
    }

    .cm-wrap-block .CodeMirror {
      height: auto;
      background: #030712;
      font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
      font-size: 12px;
      line-height: 1.6;
    }

    .cm-wrap-block .CodeMirror-gutters {
      background: #030712;
      border-right: 1px solid #1f2937;
    }

    .cm-wrap-block .CodeMirror-scroll {
      min-height: 0;
    }

    .guide-content p {
      max-width: 65ch;
    }

    .log-expand {
      cursor: pointer;
      user-select: none;
    }

    .log-expand:hover {
      background: rgba(139, 92, 246, 0.08);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .log-new {
      animation: fadeIn 0.2s ease-out;
    }

    @keyframes guideRunPulse {

      0%,
      100% {
        border-color: #065f46;
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.1);
      }

      50% {
        border-color: #10b981;
        box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.18);
      }
    }

    .eval-running {
      animation: guideRunPulse 1.2s ease-in-out infinite;
    }
  </style>
</head>

<body class="bg-gray-950 text-gray-300 h-screen flex flex-col">
  <div id="preloader"
    style="position:fixed;inset:0;z-index:9999;background:#030712;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.3s ease">
    <canvas id="moon" width="120" height="120" style="width:120px;height:120px;border-radius:50%"></canvas>
    <span style="margin-top:16px;font-size:14px;font-weight:600;color:#6b7280;letter-spacing:0.05em">Mooncore</span>
  </div>
  <script>
    (function () {
      var canvas = document.getElementById('moon');
      var ctx = canvas.getContext('2d');
      var cx = 60, cy = 60, R = 52;
      var off = document.createElement('canvas');
      off.width = 120; off.height = 120;
      var oc = off.getContext('2d');
      function seededRand(seed) {
        var s = seed;
        return function () {
          s = (s * 1664525 + 1013904223) & 0xffffffff;
          return (s >>> 0) / 0xffffffff;
        };
      }
      function drawSurface() {
        var g = oc.createRadialGradient(cx - 10, cy - 10, 4, cx, cy, R);
        g.addColorStop(0, '#e8e8e8'); g.addColorStop(0.3, '#d0d0d0');
        g.addColorStop(0.6, '#b0b0b0'); g.addColorStop(0.85, '#989898'); g.addColorStop(1, '#787878');
        oc.beginPath(); oc.arc(cx, cy, R, 0, Math.PI * 2); oc.fillStyle = g; oc.fill();
        var mares = [
          { x: 48, y: 44, rx: 14, ry: 11, a: -0.3, dark: 0.22 },
          { x: 66, y: 58, rx: 10, ry: 8, a: 0.5, dark: 0.18 },
          { x: 38, y: 62, rx: 8, ry: 6, a: 0.2, dark: 0.16 },
          { x: 72, y: 38, rx: 6, ry: 5, a: -0.1, dark: 0.14 }
        ];
        mares.forEach(function (m) {
          oc.save(); oc.translate(m.x, m.y); oc.rotate(m.a);
          var mg = oc.createRadialGradient(0, 0, 1, 0, 0, Math.max(m.rx, m.ry));
          mg.addColorStop(0, 'rgba(40,40,40,' + m.dark + ')');
          mg.addColorStop(0.7, 'rgba(40,40,40,' + (m.dark * 0.5) + ')');
          mg.addColorStop(1, 'rgba(40,40,40,0)');
          oc.beginPath(); oc.ellipse(0, 0, m.rx, m.ry, 0, 0, Math.PI * 2);
          oc.fillStyle = mg; oc.fill(); oc.restore();
        });
        oc.save(); oc.globalCompositeOperation = 'destination-in';
        oc.beginPath(); oc.arc(cx, cy, R, 0, Math.PI * 2); oc.fillStyle = '#fff'; oc.fill(); oc.restore();
        var craters = [
          { x: 44, y: 40, r: 8 }, { x: 70, y: 52, r: 5.5 }, { x: 54, y: 70, r: 10 },
          { x: 36, y: 65, r: 4.5 }, { x: 76, y: 36, r: 4 }, { x: 60, y: 28, r: 3.5 },
          { x: 50, y: 55, r: 3 }, { x: 64, y: 75, r: 3 }, { x: 32, y: 48, r: 2.5 },
          { x: 80, y: 62, r: 2.5 }, { x: 46, y: 80, r: 2 }, { x: 72, y: 72, r: 2 }
        ];
        craters.forEach(function (c) {
          var eb = oc.createRadialGradient(c.x, c.y, c.r * 0.8, c.x, c.y, c.r * 1.8);
          eb.addColorStop(0, 'rgba(210,210,210,0.25)'); eb.addColorStop(0.5, 'rgba(200,200,200,0.1)'); eb.addColorStop(1, 'rgba(200,200,200,0)');
          oc.beginPath(); oc.arc(c.x, c.y, c.r * 1.8, 0, Math.PI * 2); oc.fillStyle = eb; oc.fill();
          var rim = oc.createRadialGradient(c.x - c.r * 0.3, c.y - c.r * 0.3, c.r * 0.5, c.x, c.y, c.r * 1.05);
          rim.addColorStop(0, 'rgba(255,255,255,0)'); rim.addColorStop(0.75, 'rgba(255,255,255,0.18)'); rim.addColorStop(1, 'rgba(255,255,255,0.08)');
          oc.beginPath(); oc.arc(c.x, c.y, c.r * 1.05, 0, Math.PI * 2); oc.fillStyle = rim; oc.fill();
          var bowl = oc.createRadialGradient(c.x + c.r * 0.2, c.y + c.r * 0.2, 0, c.x, c.y, c.r);
          bowl.addColorStop(0, 'rgba(30,30,30,0.55)'); bowl.addColorStop(0.6, 'rgba(30,30,30,0.4)'); bowl.addColorStop(1, 'rgba(30,30,30,0.05)');
          oc.beginPath(); oc.arc(c.x, c.y, c.r, 0, Math.PI * 2); oc.fillStyle = bowl; oc.fill();
        });
        var rnd2 = seededRand(99);
        for (var i = 0; i < 320; i++) {
          var angle = rnd2() * Math.PI * 2;
          var dist = rnd2() * R * 0.95;
          var nx = cx + Math.cos(angle) * dist;
          var ny = cy + Math.sin(angle) * dist;
          var size = rnd2() * 1.2 + 0.3;
          var bright = rnd2() > 0.5;
          oc.beginPath(); oc.arc(nx, ny, size, 0, Math.PI * 2);
          oc.fillStyle = bright ? 'rgba(255,255,255,' + (0.06 + rnd2() * 0.08) + ')' : 'rgba(0,0,0,' + (0.04 + rnd2() * 0.07) + ')';
          oc.fill();
        }
        var limb = oc.createRadialGradient(cx, cy, R * 0.55, cx, cy, R);
        limb.addColorStop(0, 'rgba(0,0,0,0)'); limb.addColorStop(0.7, 'rgba(0,0,0,0.05)'); limb.addColorStop(1, 'rgba(0,0,0,0.35)');
        oc.beginPath(); oc.arc(cx, cy, R, 0, Math.PI * 2); oc.fillStyle = limb; oc.fill();
      }
      drawSurface();
      function draw(t) {
        ctx.clearRect(0, 0, 120, 120);
        ctx.drawImage(off, 0, 0);
        var shadowR = R * 1.3, travel = R * 4.5;
        var sx = cx + R * 1.8 - t * travel, sy = cy - R * 1.8 + t * travel;
        ctx.save(); ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.clip();
        ctx.beginPath(); ctx.arc(sx, sy, shadowR, 0, Math.PI * 2); ctx.fillStyle = 'rgba(5,4,14,0.94)'; ctx.fill(); ctx.restore();
        var halo = ctx.createRadialGradient(cx, cy, R - 1, cx, cy, R + 7);
        halo.addColorStop(0, 'rgba(200,200,210,0.13)'); halo.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.beginPath(); ctx.arc(cx, cy, R + 7, 0, Math.PI * 2); ctx.fillStyle = halo; ctx.fill();
      }
      var start = null;
      function animate(ts) { if (!start) start = ts; draw(((ts - start) % 8000) / 8000); requestAnimationFrame(animate); }
      requestAnimationFrame(animate);
      window.__dismissPreloader = function () {
        var pl = document.getElementById('preloader');
        if (pl) {
          pl.style.transition = 'opacity 0.3s ease';
          pl.style.opacity = '0';
          pl.style.pointerEvents = 'none';
          setTimeout(function () { if (pl && pl.parentNode) pl.parentNode.removeChild(pl); }, 320);
        }
      };
    })();
  </script>
  <div id="app" class="flex-1 flex flex-col overflow-hidden"></div>

  <!-- External scripts loaded here so preloader renders first -->
  <script src="https://cdn.jsdelivr.net/npm/preact@10.19.3/dist/preact.umd.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/ruby/ruby.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/xml/xml.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/markdown/markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/yaml/yaml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/shell/shell.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/erlang/erlang.min.js"></script>

  <script src="${BASE}/assets/js/app.js"></script>
  <script src="${BASE}/assets/js/components.js"></script>
  <script src="${BASE}/assets/js/page-dashboard.js"></script>
  <script src="${BASE}/assets/js/page-ets.js"></script>
  <script src="${BASE}/assets/js/page-api.js"></script>
  <script src="${BASE}/assets/js/page-tools.js"></script>
  <script src="${BASE}/assets/js/page-clients.js"></script>
  <script src="${BASE}/assets/js/page-sockets.js"></script>
  <script src="${BASE}/assets/js/page-console.js"></script>

</body>

</html>
